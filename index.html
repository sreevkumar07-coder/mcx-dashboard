<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Dashboard (Live Spot)</title>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }
.box {
  border: 1px solid #ccc;
  padding: 15px;
  width: 320px;
  background: #f9f9f9;
}
.status { margin-bottom: 10px; }
.meta { margin-top: 15px; font-size: 12px; color: gray; }
</style>

</head>

<body>

<h2>Gold Spot Dashboard (Live)</h2>

<div class="status" id="status">Loading...</div>

<div class="box" id="output"></div>

<div class="meta" id="time"></div>

<script>

// ===== CONSTANTS =====
const conv = 31.99;
const factor = 1.15;

// ===== FETCH USDINR =====
async function getINR() {
  const res = await fetch(
    "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json"
  );
  const data = await res.json();
  return data.usd.inr;
}

// ===== FETCH XAU =====
async function getXAU() {
  const res = await fetch(
    "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/xau.json"
  );
  const data = await res.json();

  // xau → usd (USD per gold unit)
  return data.xau.usd;
}

// ===== MAIN =====
async function load() {
  try {

    document.getElementById("status").innerText = "Fetching live data...";

    const inr = await getINR();
    const xau = await getXAU();

    const spot = xau * inr * conv / 1000 * factor;

    document.getElementById("output").innerHTML = `
      <b>XAU/USD</b>: ${xau.toFixed(2)}<br><br>
      <b>USD/INR</b>: ${inr.toFixed(2)}<br><br>
      <b>Spot (₹/10g)</b>: ${Math.round(spot)}
    `;

    document.getElementById("status").innerText = "Live ✅";

    document.getElementById("time").innerText =
      "Last updated: " + new Date().toLocaleString();

  } catch (e) {

    document.getElementById("status").innerText =
      "❌ Fetch error (API unavailable)";

  }
}

// run
load();

// auto refresh
setInterval(load, 60000);

</script>

</body>
</html>
