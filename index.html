<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MCX Gold Forward Premium Dashboard</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  padding: 12px;
  background: #f5f5f5;
  color: #222;
}

h2 {
  font-size: 18px;
  margin-bottom: 10px;
}

.card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 8px;
  margin-bottom: 10px;
  display: block;
  width: fit-content;
}

.card-title {
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 4px;
  color: #333;
}

table {
  border-collapse: collapse;
}

th {
  background: #4a7c59;
  color: #fff;
  border: 1px solid #3a6a49;
  padding: 4px 6px;
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  vertical-align: middle;
  line-height: 1.25;
  white-space: nowrap;
}

th span {
  display: block;
  white-space: nowrap;
}

td {
  border: 1px solid #ccc;
  padding: 4px 6px;
  text-align: right;
  font-size: 14px;
  background: #fafff7;
  line-height: 1.25;
  white-space: nowrap;
}

td.center { text-align: center; }
td.bold { font-weight: bold; }

.footer {
  margin-top: 6px;
  font-size: 10px;
  color: #999;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.footer span {
  background: #eee;
  padding: 1px 6px;
  border-radius: 4px;
}

</style>
</head>

<body>

<h2>MCX Gold Forward Premium Dashboard</h2>

<div id="tables"></div>

<div class="footer" id="footer"></div>

<script>

const WORKER_URL = "https://mcxdashboard.sreekumar.workers.dev";

const conv = 31.99;
const duty = 1.15;

let lastFetchTime = null;
const STALE_LIMIT = 5 * 60 * 1000;

function getExpiries() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth() + 1;
  const day = today.getDate();

  const evenMonths = [2, 4, 6, 8, 10, 12];
  const expiries = [];

  for (let y = year; y <= year + 1; y++) {
    for (const m of evenMonths) {
      expiries.push(new Date(y, m - 1, 5));
    }
  }

  const upcoming = expiries
    .filter(d => d >= new Date(year, month - 1, day))
    .sort((a, b) => a - b);

  return { near: upcoming[0], next: upcoming[1] };
}

function formatExpiry(d) {
  return d.toLocaleDateString('en-IN', {
    day: '2-digit', month: 'short', year: '2-digit'
  });
}

function monthDay(d) {
  return d.toLocaleDateString('en-US', {
    month: 'short', day: '2-digit'
  });
}

function toISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

const comma = new Intl.NumberFormat('en-IN');
function d0(x) { return comma.format(Math.round(x)); }
function d2(x) { return Number(x).toFixed(2); }

function daysTo(dateStr) {
  const today = new Date();
  const exp = new Date(dateStr);
  return Math.max(1, Math.round(
    (exp - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / 86400000
  ));
}

function buildTable(expiryDate, xau, inr, mcxPer10g) {

  const expISO = toISO(expiryDate);

  const spotWithout = xau * inr * conv / 1000;
  const spotWith = spotWithout * duty;

  const mcxPerGram = mcxPer10g / 10;

  const premium = mcxPerGram - spotWith;
  const days = daysTo(expISO);
  const annualised = (premium / spotWith) / days * 365 * 100;
  const xauFwd = mcxPerGram / duty / inr / conv * 1000;

  return `
  <div class="card">
    <div class="card-title">${monthDay(expiryDate)} Contract (${formatExpiry(expiryDate)})</div>
    <table>
      <tr>
        <th><span>MCX</span><span>Contract</span><span>Expiry</span></th>
        <th><span>XAU/USD</span><span>Spot Rate</span></th>
        <th><span>USD/INR</span><span>Spot Rate</span></th>
        <th><span>Gold/INR</span><span>Spot Rate</span><span>With Duty</span></th>
        <th><span>${monthDay(expiryDate)}</span><span>MCX Fwd</span><span>Rate</span></th>
        <th><span>Forward</span><span>Premium/</span><span>(Discount)</span></th>
        <th><span>Annualised Fwd</span><span>Premium/</span><span>(Discount) %</span></th>
        <th><span>XAU/USD</span><span>Forward</span><span>Rate</span></th>
      </tr>
      <tr>
        <td class="center">${formatExpiry(expiryDate)}</td>
        <td>${d0(xau)}</td>
        <td>${d2(inr)}</td>
        <td class="bold">${d0(spotWith)}</td>
        <td class="bold">${d0(mcxPerGram)}</td>
        <td>${Math.round(premium)}</td>
        <td class="bold">${d2(annualised)}%</td>
        <td class="bold">${d0(xauFwd)}</td>
      </tr>
    </table>
  </div>
  `;
}

async function load() {
  try {

    const res = await fetch(WORKER_URL, { cache: "no-store" });
    const data = await res.json();

    if (!data.ok) throw new Error("API returned not ok");

    const xau = Number(data.xau);
    const inr = Number(data.inr);
    const { near, next } = getExpiries();

    let html = "";

    if (data.mcx_jun) {
      html += buildTable(near, xau, inr, data.mcx_jun);
    }

    if (data.mcx_aug) {
      html += buildTable(next, xau, inr, data.mcx_aug);
    } else {
      html += `<div class="card">
        <div class="card-title">${monthDay(next)} Contract (${formatExpiry(next)})</div>
        <p style="color:#888; padding:4px; font-size:12px;">
          Next expiry data not available yet.
        </p>
      </div>`;
    }

    document.getElementById("tables").innerHTML = html;

    lastFetchTime = Date.now();

    document.getElementById("footer").innerHTML = `
      <span>Updated: ${new Date().toLocaleString()}</span>
      <span>Near: ${formatExpiry(near)}</span>
      <span>Next: ${formatExpiry(next)}</span>
    `;

  } catch (e) {
    console.error(e);
    document.getElementById("footer").innerHTML = `
      <span style="color:#c00;">❌ Data error</span>
    `;
  }
}

setInterval(function() {
  if (!lastFetchTime || (Date.now() - lastFetchTime) > STALE_LIMIT) {
    load();
  }
}, 30000);

load();

</script>

</body>
</html>
