<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MCX Gold Forward Dashboard</title>
<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }

table {
  border-collapse: collapse;
  margin-bottom: 25px;
  width: 100%;
  max-width: 1100px;
}

th {
  background: #a9bf9c;
  border: 2px solid black;
  padding: 10px 8px;
  text-align: center;
  font-size: 14px;
  font-weight: bold;
}

td {
  border: 2px solid black;
  padding: 10px 8px;
  text-align: right;
  font-size: 18px;
}

td.center { text-align: center; }
td.bold { font-weight: bold; }

.status { margin-bottom: 10px; font-size: 14px; }
.meta { margin-top: 10px; font-size: 12px; color: gray; }
</style>
</head>

<body>

<h2>MCX Gold Forward Premium Dashboard</h2>

<div class="status" id="status">Loading...</div>

<div id="tables"></div>

<div class="meta" id="time"></div>

<script>

const WORKER_URL = "https://mcxdashboard.sreekumar.workers.dev";

// ===== CONSTANTS =====
const conv = 31.99;
const duty = 1.15;

// ===== AUTO EXPIRY CALCULATOR =====
// MCX Gold expires on 5th of every EVEN month
// Even months: 2, 4, 6, 8, 10, 12

function getExpiries() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth() + 1; // 1-12
  const day = today.getDate();

  const evenMonths = [2, 4, 6, 8, 10, 12];

  // Build list of upcoming expiry dates (next 6)
  const expiries = [];

  for (let y = year; y <= year + 1; y++) {
    for (const m of evenMonths) {
      const expDate = new Date(y, m - 1, 5); // month is 0-indexed
      expiries.push(expDate);
    }
  }

  // Filter: only future or today
  const upcoming = expiries.filter(d => {
    // If expiry is today, still consider it "near" until end of day
    return d >= new Date(year, month - 1, day);
  });

  // Sort by date
  upcoming.sort((a, b) => a - b);

  // Near = first upcoming, Next = second upcoming
  const near = upcoming[0];
  const next = upcoming[1];

  return { near, next };
}

function formatExpiry(d) {
  return d.toLocaleDateString('en-GB', {
    day: '2-digit', month: 'short', year: '2-digit'
  });
}

function monthLabel(d) {
  return d.toLocaleDateString('en-US', {
    month: 'short', day: '2-digit'
  });
}

function toISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

// ===== HELPERS =====
const comma = new Intl.NumberFormat('en-IN');

function d0(x) { return comma.format(Math.round(x)); }
function d2(x) { return Number(x).toFixed(2); }

function daysTo(dateStr) {
  const today = new Date();
  const exp = new Date(dateStr);
  const diff = (exp - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / 86400000;
  return Math.max(1, Math.round(diff));
}

// ===== BUILD TABLE =====
function buildTable(expiryDate, xau, inr, mcxFwdPer10g) {

  const expISO = toISO(expiryDate);

  const spotWithout = xau * inr * conv / 1000;
  const spotWith = spotWithout * duty;

  // MCX is per 10g, convert to per gram
  const mcxPerGram = mcxFwdPer10g / 10;

  const premium = mcxPerGram - spotWith;
  const days = daysTo(expISO);
  const annualised = (premium / spotWith) / days * 365 * 100;
  const xauFwd = mcxPerGram / duty / inr / conv * 1000;

  return `
  <table>
    <tr>
      <th>MCX CONTRACT EXPIRY</th>
      <th>XAU/USD SPOT RATE</th>
      <th>USD/INR SPOT RATE</th>
      <th>GOLD/INR SPOT RATE WITHOUT DUTY</th>
      <th>GOLD/INR SPOT RATE WITH DUTY</th>
      <th>${monthLabel(expiryDate)} MCX FWD RATE</th>
      <th>FORWARD PREMIUM/ (DISCOUNT)</th>
      <th>ANNUALISED FORWARD PREMIUM/ (DISCOUNT) %</th>
      <th>XAU/USD FORWARD RATE</th>
    </tr>
    <tr>
      <td class="center">${formatExpiry(expiryDate)}</td>
      <td>${d0(xau)}</td>
      <td>${d2(inr)}</td>
      <td>${d0(spotWithout)}</td>
      <td class="bold">${d0(spotWith)}</td>
      <td class="bold">${d0(mcxPerGram)}</td>
      <td>${Math.round(premium)}</td>
      <td class="bold">${d2(annualised)}%</td>
      <td class="bold">${d0(xauFwd)}</td>
    </tr>
  </table>
  `;
}

// ===== MAIN =====
async function load() {
  try {
    document.getElementById("status").innerText = "Fetching live data...";

    const res = await fetch(WORKER_URL, { cache: "no-store" });
    const data = await res.json();

    if (!data.ok) throw new Error("API returned not ok");

    const xau = Number(data.xau);
    const inr = Number(data.inr);

    // Auto-calculate expiries
    const { near, next } = getExpiries();

    let html = "";

    // Near expiry table (Jun → Aug → Oct automatically)
    if (data.mcx_jun) {
      html += buildTable(near, xau, inr, data.mcx_jun);
    }

    // Next expiry table
    if (data.mcx_aug) {
      html += buildTable(next, xau, inr, data.mcx_aug);
    } else {
      html += `<p style="color:gray;">⚠️ Next expiry (${formatExpiry(next)}) data not available yet</p>`;
    }

    // Show which contracts are active
    html += `<div class="meta">
      Near expiry: ${formatExpiry(near)} &nbsp;|&nbsp;
      Next expiry: ${formatExpiry(next)} &nbsp;|&nbsp;
      Auto-rolling ✅
    </div>`;

    document.getElementById("tables").innerHTML = html;
    document.getElementById("status").innerText = "Live ✅";
    document.getElementById("time").innerText = "Updated: " + new Date().toLocaleString();

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText = "❌ Data error";
  }
}

// run
load();
setInterval(load, 30000);

</script>

</body>
</html>
