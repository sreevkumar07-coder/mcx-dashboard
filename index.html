<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Forward Dashboard</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

table {
  border-collapse: collapse;
  margin-top: 20px;
  width: 100%;
}

th {
  background: #a9bf9c;
  border: 1px solid black;
  padding: 10px;
  text-align: center;
}

td {
  border: 1px solid black;
  padding: 8px;
  text-align: right;
  font-size: 18px;
}

.center {
  text-align: center;
}

.bold {
  font-weight: bold;
}

.section {
  margin-bottom: 25px;
}
</style>
</head>

<body>

<h2>Gold Forward Dashboard</h2>

<div id="tables"></div>

<script>

const URL = "https://mcxdashboard.sreekumar.workers.dev";

// constants
const conv = 31.99;
const duty = 1.15;

// ===== FORMAT =====
const comma = new Intl.NumberFormat('en-IN');

function d0(x) { return comma.format(Math.round(x)); }
function d2(x) { return Number(x).toFixed(2); }

// ===== MAIN =====
async function load() {

  const res = await fetch(URL);
  const data = await res.json();

  const xau = Number(data.xau);
  const inr = Number(data.inr);

  // ===== BASE CALC =====
  const usdPerGram = xau / conv;
  const spot = usdPerGram * inr;
  const spotIndia = spot * duty;

  // ===== STATIC MCX VALUES (YOUR SAMPLE) =====
  // You can later make dynamic if needed
  const junFwd = 15943;
  const augFwd = 16249;

  // ===== CALCULATIONS =====
  function calcRow(expiry, fwd) {

    const premium = fwd - spotIndia;

    const annual =
      (premium / spotIndia) *
      (365 / daysTo(expiry)) * 100;

    const xauFwd =
      (fwd / 10 / inr) * conv;

    return `
    <div class="section">

    <table>

      <tr>
        <th>MCX CONTRACT EXPIRY</th>
        <th>XAU/USD SPOT RATE</th>
        <th>USD/INR SPOT RATE</th>
        <th>GOLD/INR SPOT RATE WITHOUT DUTY</th>
        <th>GOLD/INR SPOT RATE WITH DUTY</th>
        <th>${label(expiry)} MCX FWD RATE</th>
        <th>FORWARD PREMIUM/(DISCOUNT)</th>
        <th>ANNUALISED FORWARD PREMIUM/(DISCOUNT) %</th>
        <th>XAU/USD FORWARD RATE</th>
      </tr>

      <tr>
        <td class="center">${expiry}</td>
        <td>${d0(xau)}</td>
        <td>${d2(inr)}</td>
        <td>${d0(spot)}</td>
        <td class="bold">${d0(spotIndia)}</td>
        <td class="bold">${d0(fwd)}</td>
        <td>${premium >= 0 ? premium : premium}</td>
        <td class="bold">${d2(annual)}%</td>
        <td class="bold">${Math.round(xauFwd)}</td>
      </tr>

    </table>

    </div>`;
  }

  document.getElementById("tables").innerHTML =
    calcRow("05-Jun-26", junFwd) +
    calcRow("05-Aug-26", augFwd);
}

// ===== HELPERS =====
function daysTo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  return (d - now) / 86400000;
}

function label(date) {
  const d = new Date(date);
  return d.toLocaleString('en-US', { month: 'short', day: '2-digit' });
}

// run
load();

setInterval(load, 60000);

</script>

</body>
</html>
