<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Analytics Dashboard</title>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 5px; }

table {
  border-collapse: collapse;
  margin-top: 10px;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: right;
}

th {
  background: #f2f2f2;
}

.meta {
  margin-top: 12px;
  font-size: 12px;
  color: gray;
}

.status {
  margin-bottom: 10px;
}
</style>

</head>

<body>

<h2>Gold Analytics Dashboard</h2>

<div class="status" id="status">Loading...</div>

<div id="table"></div>

<div class="meta" id="time"></div>

<script>

// ===== CONSTANTS =====
const conv = 31.99;     // grams per oz
const premium = 1.15;   // India premium factor

// ===== FETCH USD DATA =====
async function getData() {
  const res = await fetch(
    "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json"
  );
  const data = await res.json();

  const usdToInr = data.usd.inr;

  // ✅ Better XAU using inversion
  const usdToXau = data.usd.xau;
  const xauUsd = 1 / usdToXau;

  return { usdToInr, xauUsd };
}

// ===== MAIN =====
async function load() {

  try {

    document.getElementById("status").innerText = "Fetching live data...";

    const data = await getData();

    const xau = data.xauUsd;
    const inr = data.usdToInr;

    // ===== CORE CALCS =====

    // USD per gram
    const usdPerGram = xau / conv;

    // INR per gram (spot)
    const inrPerGram = usdPerGram * inr;

    // INR per gram (with premium)
    const indiaPrice = inrPerGram * premium;

    // cross-check (direct)
    const direct = (xau * inr) / conv;

    // ===== DISPLAY =====

    document.getElementById("table").innerHTML = `
    
    <table>
    <tr>
      <th colspan="2">Market Inputs</th>
      <th colspan="2">Derived Values</th>
    </tr>

    <tr>
      <td>XAU/USD</td><td>${xau.toFixed(2)}</td>
      <td>USD / gram</td><td>${usdPerGram.toFixed(2)}</td>
    </tr>

    <tr>
      <td>USD/INR</td><td>${inr.toFixed(2)}</td>
      <td>₹ / gram (spot)</td><td>${Math.round(inrPerGram)}</td>
    </tr>

    <tr>
      <td>Cross Check</td><td>${Math.round(direct)}</td>
      <td>₹ / gram (India adj)</td><td>${Math.round(indiaPrice)}</td>
    </tr>

    </table>
    `;

    document.getElementById("status").innerText = "Live ✅";

    document.getElementById("time").innerText =
      "Last updated: " + new Date().toLocaleString();

  } catch (e) {

    document.getElementById("status").innerText =
      "❌ Data error (API issue)";

  }
}

// run
load();
setInterval(load, 60000);

</script>

</body>
</html>
