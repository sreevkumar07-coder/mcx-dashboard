<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Dashboard</title>
</head>

<body>

<h2>Test (No MCX)</h2>

<div id="output">Loading...</div>

<script>

// ===== YOUR CONSTANTS =====
const conv = 31.99;
const factor = 1.15;

// ===== FETCH XAU =====
async function getXAU() {
  const res = await fetch("https://gold-api.com/price/XAU");
  const data = await res.json();
  return data.price;
}

// ===== FETCH USDINR =====
async function getINR() {
  const res = await fetch("https://latest.currency-api.pages.dev/v1/currencies/usd.json");
  const data = await res.json();
  return data.usd.inr;
}

// ===== MAIN =====
async function load() {

  try {

    const xau = await getXAU();
    const inr = await getINR();

    const spot = xau * inr * conv / 1000 * factor;

    document.getElementById("output").innerHTML = `
      XAU/USD: ${xau} <br>
      USD/INR: ${inr.toFixed(2)} <br>
      Spot (₹/10g): ${Math.round(spot)}
    `;

  } catch (e) {
    document.getElementById("output").innerText =
      "❌ Fetch failed";
  }
}

load();

</script>

</body>
</html>
