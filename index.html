<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Realtime Dashboard</title>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }

.box {
  border: 1px solid #ccc;
  padding: 15px;
  width: 320px;
  background: #f9f9f9;
}

.status { margin-bottom: 10px; }
.meta { margin-top: 10px; font-size: 12px; color: gray; }
</style>
</head>

<body>

<h2>Gold Realtime Dashboard</h2>

<div class="status" id="status">Loading...</div>

<div class="box" id="output"></div>

<div class="meta" id="time"></div>

<script>

const WORKER_URL = "https://mcxdashboard.sreekumar.workers.dev/";

// conversion constants
const conv = 31.99;
const factor = 1.15;

// format timestamp
function formatTime(ts) {
  return new Date(ts * 1000).toLocaleString();
}

async function load() {
  try {

    document.getElementById("status").innerText = "Fetching live data...";

    const res = await fetch(WORKER_URL);
    const data = await res.json();

    const xau = data.xau;
    const inr = data.inr;
    const fxTime = formatTime(data.inr_market_time_unix);

    // ===== CALCULATION =====
    const usdPerGram = xau / conv;
    const inrPerGram = usdPerGram * inr;
    const indiaPrice = inrPerGram * factor;

    // freshness check
    const age = Math.floor((Date.now()/1000 - data.inr_market_time_unix)/60);

    let freshness =
      age < 2 ? "🟢 Live" :
      age < 5 ? "🟡 Slight delay" :
      "🔴 Delayed";

    document.getElementById("output").innerHTML = `
      <b>XAU/USD:</b> ${xau.toFixed(2)}<br><br>

      <b>USD/INR:</b> ${inr.toFixed(4)}<br>
      <small>Last FX update: ${fxTime}</small><br>
      <small>Status: ${freshness}</small><br><br>

      <b>₹/gram (spot):</b> ${Math.round(inrPerGram)}<br>
      <b>₹/gram (India adj):</b> ${Math.round(indiaPrice)}
    `;

    document.getElementById("status").innerText = "Live ✅";

    document.getElementById("time").innerText =
      "Updated: " + new Date().toLocaleString();

  } catch (e) {

    document.getElementById("status").innerText =
      "❌ API Error";

  }
}

// run
load();

// refresh every 60 sec
setInterval(load, 60000);

</script>

</body>
</html>
