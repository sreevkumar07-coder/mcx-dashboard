<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MCX Gold Forward Premium Dashboard</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
  padding: 0;
  background: #1a0a0c;
  color: #fff;
  -webkit-text-size-adjust: 100%;
}

.header {
  background: linear-gradient(135deg, #721C24, #4a1018);
  padding: 12px 10px 8px;
  text-align: center;
  border-bottom: 3px solid #ffc028;
}

.header h2 {
  font-size: 15px;
  color: #ffc028;
  letter-spacing: 0.5px;
  margin: 0;
}

.header .sub {
  font-size: 9px;
  color: #ddd;
  margin-top: 2px;
}

.content {
  padding: 8px;
}

.card {
  background: linear-gradient(180deg, #2a1015, #1a0a0c);
  border: 1px solid #FFDE00;
  border-radius: 8px;
  padding: 6px;
  margin-bottom: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.card-title {
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 4px;
  color: #FFDE00;
  text-align: center;
  letter-spacing: 0.3px;
}

table {
  border-collapse: collapse;
  white-space: nowrap;
}

th {
  background: #721C24;
  color: #FFDE00;
  border: 1px solid #FFDE00;
  padding: 4px 8px;
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  vertical-align: middle;
  line-height: 1.3;
}

td {
  border: 1px solid #5a3035;
  padding: 6px 8px;
  text-align: center;
  font-size: 14px;
  font-weight: bold;
  background: #2a1015;
  color: #fff;
  line-height: 1.2;
  white-space: nowrap;
}

.footer-bar {
  background: #721C24;
  padding: 6px 10px;
  font-size: 9px;
  color: #ccc;
  text-align: center;
  border-top: 2px solid #FFDE00;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
}

.spacer {
  height: 30px;
}

</style>
</head>

<body>

<div class="header">
  <h2>MCX Gold Forward Premium Dashboard</h2>
  <div class="sub" id="updated"></div>
</div>

<div class="content">
  <div id="tables"></div>
  <div class="spacer"></div>
</div>

<div class="footer-bar" id="footer"></div>

<script>

var WORKER_BASE = "https://mcxdashboard.sreekumar.workers.dev";

var conv = 31.99;
var duty = 1.15;

var lastFetchTime = null;
var STALE_LIMIT = 5 * 60 * 1000;

var MN = {1:"JAN",2:"FEB",3:"MAR",4:"APR",5:"MAY",6:"JUN",7:"JUL",8:"AUG",9:"SEP",10:"OCT",11:"NOV",12:"DEC"};

function getExpiries() {
  var today = new Date();
  var year = today.getFullYear();
  var month = today.getMonth() + 1;
  var day = today.getDate();

  var evenMonths = [2, 4, 6, 8, 10, 12];
  var expiries = [];

  for (var y = year; y <= year + 1; y++) {
    for (var i = 0; i < evenMonths.length; i++) {
      expiries.push({ date: new Date(y, evenMonths[i] - 1, 5), m: evenMonths[i] });
    }
  }

  var upcoming = [];
  var cutoff = new Date(year, month - 1, day);
  for (var j = 0; j < expiries.length; j++) {
    if (expiries[j].date >= cutoff) upcoming.push(expiries[j]);
  }
  upcoming.sort(function(a, b) { return a.date - b.date; });

  return {
    near: upcoming[0],
    next: upcoming[1],
    far: upcoming[2]
  };
}

function formatExpiry(d) {
  return d.toLocaleDateString('en-IN', {
    day: '2-digit', month: 'short', year: '2-digit'
  });
}

function monthDay(d) {
  return d.toLocaleDateString('en-US', {
    month: 'short', day: '2-digit'
  });
}

function toISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

var comma = new Intl.NumberFormat('en-IN');
function d0(x) { return comma.format(Math.round(x)); }
function d2(x) { return Number(x).toFixed(2); }

function fmtPrem(x) {
  var v = Math.round(x);
  return v < 0 ? "(" + comma.format(Math.abs(v)) + ")" : comma.format(v);
}

function fmtPct(x) {
  var v = Number(x).toFixed(2);
  return Number(v) < 0
    ? "(" + Math.abs(Number(v)).toFixed(2) + "%)"
    : v + "%";
}

function daysTo(dateStr) {
  var today = new Date();
  var exp = new Date(dateStr);
  return Math.max(1, Math.round(
    (exp - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / 86400000
  ));
}

function buildTable(expiryDate, xau, inr, mcxPer10g) {

  var expISO = toISO(expiryDate);
  var spotWith = xau * inr * conv / 1000 * duty;
  var mcxPerGram = mcxPer10g / 10;
  var premium = mcxPerGram - spotWith;
  var days = daysTo(expISO);
  var annualised = (premium / spotWith) / days * 365 * 100;
  var xauFwd = mcxPerGram / duty / inr / conv * 1000;

  return '<div class="card">' +
    '<div class="card-title">' + monthDay(expiryDate) + ' Contract (' + formatExpiry(expiryDate) + ')</div>' +
    '<table>' +
    '<tr>' +
      '<th>MCX<br>Expiry</th>' +
      '<th>XAU/USD<br>Spot</th>' +
      '<th>USD/INR<br>Spot</th>' +
      '<th>Gold/INR<br>Spot<br>With Duty</th>' +
      '<th>' + monthDay(expiryDate) + '<br>MCX Fwd<br>Rate</th>' +
      '<th>Forward<br>Premium/<br>(Discount)</th>' +
      '<th>Annualised<br>Fwd Premium/<br>(Discount) %</th>' +
      '<th>XAU/USD<br>Forward<br>Rate</th>' +
    '</tr>' +
    '<tr>' +
      '<td>' + formatExpiry(expiryDate) + '</td>' +
      '<td>' + d0(xau) + '</td>' +
      '<td>' + d2(inr) + '</td>' +
      '<td>' + d0(spotWith) + '</td>' +
      '<td>' + d0(mcxPerGram) + '</td>' +
      '<td>' + fmtPrem(premium) + '</td>' +
      '<td>' + fmtPct(annualised) + '</td>' +
      '<td>' + d0(xauFwd) + '</td>' +
    '</tr>' +
    '</table>' +
    '</div>';
}

function buildBoardRate(gold24k, gold22k) {
  return '<div class="card">' +
    '<div class="card-title">Board Rate (Kerala)</div>' +
    '<table>' +
    '<tr>' +
      '<th>24K Gold / g</th>' +
      '<th>22K Gold / g</th>' +
    '</tr>' +
    '<tr>' +
      '<td>' + comma.format(gold24k) + '</td>' +
      '<td>' + comma.format(gold22k) + '</td>' +
    '</tr>' +
    '</table>' +
    '</div>';
}

function load() {

  var exp = getExpiries();
  var nearDate = exp.near.date;
  var nextDate = exp.next.date;
  var farDate = exp.far.date;

  var nearCode = MN[exp.near.m];
  var nextCode = MN[exp.next.m];
  var farCode = MN[exp.far.m];

  var workerURL = WORKER_BASE + "?near=" + nearCode + "&next=" + nextCode + "&far=" + farCode;

  fetch(workerURL, { cache: "no-store" })
    .then(function(res) { return res.json(); })
    .then(function(data) {

      if (!data.ok) throw new Error("not ok");

      var xau = Number(data.xau);
      var inr = Number(data.inr);

      var nearPrice = data.mcx_near || data.mcx_jun || null;
      var nextPrice = data.mcx_next || data.mcx_aug || null;
      var farPrice = data.mcx_far || data.mcx_oct || null;

      var html = "";

      if (nearPrice) {
        html += buildTable(nearDate, xau, inr, nearPrice);
      }

      if (nextPrice) {
        html += buildTable(nextDate, xau, inr, nextPrice);
      } else {
        html += '<div class="card"><div class="card-title">' + monthDay(nextDate) + ' Contract (' + formatExpiry(nextDate) + ')</div>' +
          '<p style="color:#ccc;padding:6px;font-size:11px;text-align:center;">Next expiry data not available yet.</p></div>';
      }

      if (farPrice) {
        html += buildTable(farDate, xau, inr, farPrice);
      } else {
        html += '<div class="card"><div class="card-title">' + monthDay(farDate) + ' Contract (' + formatExpiry(farDate) + ')</div>' +
          '<p style="color:#ccc;padding:6px;font-size:11px;text-align:center;">Far expiry data not available yet.</p></div>';
      }

      // Board Rate table
      if (data.gold_24k && data.gold_22k) {
        html += buildBoardRate(data.gold_24k, data.gold_22k);
      }

      document.getElementById("tables").innerHTML = html;
      lastFetchTime = Date.now();

      document.getElementById("updated").innerHTML =
        "Updated: " + new Date().toLocaleString();

      document.getElementById("footer").innerHTML =
        "Near: " + formatExpiry(nearDate) +
        " &nbsp;|&nbsp; Next: " + formatExpiry(nextDate) +
        " &nbsp;|&nbsp; Far: " + formatExpiry(farDate) +
        " &nbsp;|&nbsp; Auto-rolling";
    })
    .catch(function(e) {
      console.error(e);
      document.getElementById("updated").innerHTML = "Error loading data";
    });
}

setInterval(function() {
  if (!lastFetchTime || (Date.now() - lastFetchTime) > STALE_LIMIT) load();
}, 30000);

document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "visible") load();
});

window.addEventListener("focus", function() { load(); });

load();

</script>

</body>
</html>
