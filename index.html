<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MCX Gold Forward Premium Dashboard</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
  padding: 8px;
  background: #f0f0f0;
  color: #222;
  -webkit-text-size-adjust: 100%;
}

h2 {
  font-size: 16px;
  margin-bottom: 8px;
  text-align: center;
}

.card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 6px;
  margin-bottom: 8px;
  width: 100%;
}

.card-title {
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 4px;
  color: #333;
  text-align: center;
}

table {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed;
}

th {
  background: #4a7c59;
  color: #fff;
  border: 1px solid #3a6a49;
  padding: 4px 2px;
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  vertical-align: middle;
  line-height: 1.2;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

td {
  border: 1px solid #ccc;
  padding: 6px 2px;
  text-align: center;
  font-size: 14px;
  font-weight: bold;
  background: #fafff7;
  line-height: 1.2;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.footer {
  margin-top: 6px;
  font-size: 9px;
  color: #999;
  text-align: center;
}

</style>
</head>

<body>

<h2>MCX Gold Forward Premium Dashboard</h2>

<div id="tables"></div>

<div class="footer" id="footer"></div>

<script>

const WORKER_URL = "https://mcxdashboard.sreekumar.workers.dev";

const conv = 31.99;
const duty = 1.15;

let lastFetchTime = null;
const STALE_LIMIT = 5 * 60 * 1000;

function getExpiries() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth() + 1;
  const day = today.getDate();

  const evenMonths = [2, 4, 6, 8, 10, 12];
  const expiries = [];

  for (let y = year; y <= year + 1; y++) {
    for (const m of evenMonths) {
      expiries.push(new Date(y, m - 1, 5));
    }
  }

  const upcoming = expiries
    .filter(d => d >= new Date(year, month - 1, day))
    .sort((a, b) => a - b);

  return { near: upcoming[0], next: upcoming[1] };
}

function formatExpiry(d) {
  return d.toLocaleDateString('en-IN', {
    day: '2-digit', month: 'short', year: '2-digit'
  });
}

function monthDay(d) {
  return d.toLocaleDateString('en-US', {
    month: 'short', day: '2-digit'
  });
}

function toISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

const comma = new Intl.NumberFormat('en-IN');
function d0(x) { return comma.format(Math.round(x)); }
function d2(x) { return Number(x).toFixed(2); }

function daysTo(dateStr) {
  const today = new Date();
  const exp = new Date(dateStr);
  return Math.max(1, Math.round(
    (exp - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / 86400000
  ));
}

function buildTable(expiryDate, xau, inr, mcxPer10g) {

  const expISO = toISO(expiryDate);
  const spotWith = xau * inr * conv / 1000 * duty;
  const mcxPerGram = mcxPer10g / 10;
  const premium = mcxPerGram - spotWith;
  const days = daysTo(expISO);
  const annualised = (premium / spotWith) / days * 365 * 100;
  const xauFwd = mcxPerGram / duty / inr / conv * 1000;

  return `
  <div class="card">
    <div class="card-title">${monthDay(expiryDate)} Contract (${formatExpiry(expiryDate)})</div>
    <table>
      <tr>
        <th>MCX Expiry</th>
        <th>XAU/ USD</th>
        <th>USD/ INR</th>
        <th>Gold/ INR Duty</th>
        <th>${monthDay(expiryDate)} MCX Fwd</th>
        <th>Fwd Prem/ (Disc)</th>
        <th>Ann. Prem/ (Disc) %</th>
        <th>XAU/ USD Fwd</th>
      </tr>
      <tr>
        <td>${formatExpiry(expiryDate)}</td>
        <td>${d0(xau)}</td>
        <td>${d2(inr)}</td>
        <td>${d0(spotWith)}</td>
        <td>${d0(mcxPerGram)}</td>
        <td>${Math.round(premium)}</td>
        <td>${d2(annualised)}%</td>
        <td>${d0(xauFwd)}</td>
      </tr>
    </table>
  </div>
  `;
}

async function load() {
  try {

    const res = await fetch(WORKER_URL, { cache: "no-store" });
    const data = await res.json();

    if (!data.ok) throw new Error("API returned not ok");

    const xau = Number(data.xau);
    const inr = Number(data.inr);
    const { near, next } = getExpiries();

    let html = "";

    if (data.mcx_jun) {
      html += buildTable(near, xau, inr, data.mcx_jun);
    }

    if (data.mcx_aug) {
      html += buildTable(next, xau, inr, data.mcx_aug);
    } else {
      html += `<div class="card">
        <div class="card-title">${monthDay(next)} Contract (${formatExpiry(next)})</div>
        <p style="color:#888; padding:4px; font-size:11px; text-align:center;">
          Next expiry data not available yet.
        </p>
      </div>`;
    }

    document.getElementById("tables").innerHTML = html;
    lastFetchTime = Date.now();

    document.getElementById("footer").innerHTML =
      "Updated: " + new Date().toLocaleString() +
      " &nbsp;|&nbsp; Near: " + formatExpiry(near) +
      " &nbsp;|&nbsp; Next: " + formatExpiry(next);

  } catch (e) {
    console.error(e);
    document.getElementById("footer").innerHTML = "❌ Data error";
  }
}

setInterval(function() {
  if (!lastFetchTime || (Date.now() - lastFetchTime) > STALE_LIMIT) load();
}, 30000);

document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "visible") load();
});

window.addEventListener("focus", function() { load(); });

load();

</script>

</body>
</html>
