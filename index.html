<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold Forward Dashboard</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  padding: 24px;
  background: #f5f5f5;
  color: #222;
}

h2 {
  font-size: 22px;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 13px;
  color: #666;
  margin-bottom: 16px;
}

.status-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  font-size: 14px;
}

.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
}

.badge.live { background: #d4edda; color: #155724; }
.badge.stale { background: #fff3cd; color: #856404; }
.badge.error { background: #f8d7da; color: #721c24; }

.card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.card-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #333;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th {
  background: #4a7c59;
  color: #fff;
  border: 1px solid #3a6a49;
  padding: 10px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
}

td {
  border: 1px solid #ccc;
  padding: 10px 8px;
  text-align: right;
  font-size: 17px;
  background: #fafff7;
}

td.center { text-align: center; }
td.bold { font-weight: bold; }

.footer {
  margin-top: 10px;
  font-size: 12px;
  color: #888;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.footer span {
  background: #eee;
  padding: 3px 8px;
  border-radius: 8px;
}

</style>
</head>

<body>

<h2>Gold Forward Premium Dashboard</h2>
<div class="subtitle">Live rates from dealer feed &bull; Auto-refreshing</div>

<div class="status-bar">
  <span id="status">Loading...</span>
  <span id="badge" class="badge"></span>
</div>

<div id="tables"></div>

<div class="footer" id="footer"></div>

<script>

const WORKER_URL = "https://mcxdashboard.sreekumar.workers.dev";

// ===== CONSTANTS =====
const conv = 31.99;
const duty = 1.15;

// ===== FRESHNESS TRACKING =====
let lastFetchTime = null;
const STALE_LIMIT = 5 * 60 * 1000; // 5 minutes in ms

// ===== AUTO EXPIRY CALCULATOR =====
function getExpiries() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth() + 1;
  const day = today.getDate();

  const evenMonths = [2, 4, 6, 8, 10, 12];
  const expiries = [];

  for (let y = year; y <= year + 1; y++) {
    for (const m of evenMonths) {
      expiries.push(new Date(y, m - 1, 5));
    }
  }

  const upcoming = expiries
    .filter(d => d >= new Date(year, month - 1, day))
    .sort((a, b) => a - b);

  return { near: upcoming[0], next: upcoming[1] };
}

function formatExpiry(d) {
  return d.toLocaleDateString('en-IN', {
    day: '2-digit', month: 'short', year: '2-digit'
  });
}

function monthDay(d) {
  return d.toLocaleDateString('en-US', {
    month: 'short', day: '2-digit'
  });
}

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ===== HELPERS =====
const comma = new Intl.NumberFormat('en-IN');
function d0(x) { return comma.format(Math.round(x)); }
function d2(x) { return Number(x).toFixed(2); }

function daysTo(dateStr) {
  const today = new Date();
  const exp = new Date(dateStr);
  return Math.max(1, Math.round(
    (exp - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / 86400000
  ));
}

// ===== BUILD TABLE =====
function buildTable(expiryDate, xau, inr, mcxPer10g) {

  const expISO = toISO(expiryDate);

  const spotWithout = xau * inr * conv / 1000;
  const spotWith = spotWithout * duty;

  const mcxPerGram = mcxPer10g / 10;

  const premium = mcxPerGram - spotWith;
  const days = daysTo(expISO);
  const annualised = (premium / spotWith) / days * 365 * 100;
  const xauFwd = mcxPerGram / duty / inr / conv * 1000;

  return `
  <div class="card">
    <div class="card-title">${monthDay(expiryDate)} Contract (${formatExpiry(expiryDate)})</div>
    <table>
      <tr>
        <th>Mcx Contract Expiry</th>
        <th>Xau/Usd Spot Rate</th>
        <th>Usd/Inr Spot Rate</th>
        <th>Gold/Inr Spot Rate Without Duty</th>
        <th>Gold/Inr Spot Rate With Duty</th>
        <th>${monthDay(expiryDate)} Mcx Fwd Rate</th>
        <th>Forward Premium/ (Discount)</th>
        <th>Annualised Forward Premium/ (Discount) %</th>
        <th>Xau/Usd Forward Rate</th>
      </tr>
      <tr>
        <td class="center">${formatExpiry(expiryDate)}</td>
        <td>${d0(xau)}</td>
        <td>${d2(inr)}</td>
        <td>${d0(spotWithout)}</td>
        <td class="bold">${d0(spotWith)}</td>
        <td class="bold">${d0(mcxPerGram)}</td>
        <td>${Math.round(premium)}</td>
        <td class="bold">${d2(annualised)}%</td>
        <td class="bold">${d0(xauFwd)}</td>
      </tr>
    </table>
  </div>
  `;
}

// ===== MAIN =====
async function load() {
  try {
    document.getElementById("status").innerText = "Fetching live data...";
    document.getElementById("badge").className = "badge";
    document.getElementById("badge").innerText = "";

    const res = await fetch(WORKER_URL, { cache: "no-store" });
    const data = await res.json();

    if (!data.ok) throw new Error("API returned not ok");

    const xau = Number(data.xau);
    const inr = Number(data.inr);
    const { near, next } = getExpiries();

    let html = "";

    // Near expiry
    if (data.mcx_jun) {
      html += buildTable(near, xau, inr, data.mcx_jun);
    }

    // Next expiry
    if (data.mcx_aug) {
      html += buildTable(next, xau, inr, data.mcx_aug);
    } else {
      html += `<div class="card">
        <div class="card-title">${monthDay(next)} Contract (${formatExpiry(next)})</div>
        <p style="color:#888; padding:10px;">Next expiry data not available yet. Will appear automatically when active.</p>
      </div>`;
    }

    document.getElementById("tables").innerHTML = html;

    // Status
    lastFetchTime = Date.now();
    document.getElementById("status").innerText = "Live";
    document.getElementById("badge").className = "badge live";
    document.getElementById("badge").innerText = "✅ Live";

    // Footer
    document.getElementById("footer").innerHTML = `
      <span>Updated: ${new Date().toLocaleString()}</span>
      <span>Near: ${formatExpiry(near)}</span>
      <span>Next: ${formatExpiry(next)}</span>
      <span>Auto-rolling ✅</span>
    `;

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText = "Error";
    document.getElementById("badge").className = "badge error";
    document.getElementById("badge").innerText = "❌ Data error";
  }
}

// ===== SMART AUTO-REFRESH =====
// Check every 30 seconds
// If data is older than 5 minutes → force refresh

setInterval(function() {

  if (!lastFetchTime) {
    // Never fetched → fetch now
    load();
    return;
  }

  const age = Date.now() - lastFetchTime;

  if (age > STALE_LIMIT) {
    // Data is stale → refresh
    document.getElementById("badge").className = "badge stale";
    document.getElementById("badge").innerText = "⏳ Refreshing...";
    load();
  }

}, 30000);

// Initial load
load();

</script>

</body>
</html>
