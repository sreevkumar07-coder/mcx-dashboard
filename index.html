<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MCX Gold Forward Premium Dashboard</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
  padding: 0;
  background: #1a0a0c;
  color: #fff;
  -webkit-text-size-adjust: 100%;
}

.header {
  background: linear-gradient(135deg, #721C24, #4a1018);
  padding: 12px 10px 8px;
  text-align: center;
  border-bottom: 3px solid #FFDE00;
}

.header h2 {
  font-size: 15px;
  color: #FFDE00;
  letter-spacing: 0.5px;
  margin: 0;
}

.header .sub {
  font-size: 9px;
  color: #ddd;
  margin-top: 2px;
}

.content {
  padding: 8px;
}

.card {
  background: linear-gradient(180deg, #2a1015, #1a0a0c);
  border: 1px solid #FFDE00;
  border-radius: 8px;
  padding: 6px;
  margin-bottom: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.card-title {
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 4px;
  color: #FFDE00;
  text-align: center;
  letter-spacing: 0.3px;
}

table {
  border-collapse: collapse;
  white-space: nowrap;
}

th {
  background: #721C24;
  color: #FFDE00;
  border: 1px solid #FFDE00;
  padding: 4px 8px;
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  vertical-align: middle;
  line-height: 1.3;
}

td {
  border: 1px solid #5a3035;
  padding: 6px 8px;
  text-align: center;
  font-size: 14px;
  font-weight: bold;
  background: #2a1015;
  color: #fff;
  line-height: 1.2;
  white-space: nowrap;
}

.footer-bar {
  background: #721C24;
  padding: 6px 10px;
  font-size: 9px;
  color: #ccc;
  text-align: center;
  border-top: 2px solid #FFDE00;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
}

.spacer {
  height: 30px;
}

</style>
</head>

<body>

<div class="header">
  <h2>MCX Gold Forward Premium Dashboard</h2>
  <div class="sub" id="updated"></div>
</div>

<div class="content">
  <div id="tables"></div>
  <div class="spacer"></div>
</div>

<div class="footer-bar" id="footer"></div>

<script>

const WORKER_URL = "https://mcxdashboard.sreekumar.workers.dev";

const conv = 31.99;
const duty = 1.15;

let lastFetchTime = null;
const STALE_LIMIT = 5 * 60 * 1000;

// ===== AUTO EXPIRY (near, next, far) =====
function getExpiries() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth() + 1;
  const day = today.getDate();

  const evenMonths = [2, 4, 6, 8, 10, 12];
  const expiries = [];

  for (let y = year; y <= year + 1; y++) {
    for (const m of evenMonths) {
      expiries.push(new Date(y, m - 1, 5));
    }
  }

  const upcoming = expiries
    .filter(d => d >= new Date(year, month - 1, day))
    .sort((a, b) => a - b);

  return { near: upcoming[0], next: upcoming[1], far: upcoming[2] };
}

function formatExpiry(d) {
  return d.toLocaleDateString('en-IN', {
    day: '2-digit', month: 'short', year: '2-digit'
  });
}

function monthDay(d) {
  return d.toLocaleDateString('en-US', {
    month: 'short', day: '2-digit'
  });
}

function toISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

const comma = new Intl.NumberFormat('en-IN');
function d0(x) { return comma.format(Math.round(x)); }
function d2(x) { return Number(x).toFixed(2); }

function fmtPrem(x) {
  const v = Math.round(x);
  return v < 0 ? "(" + comma.format(Math.abs(v)) + ")" : comma.format(v);
}

function fmtPct(x) {
  const v = Number(x).toFixed(2);
  return Number(v) < 0
    ? "(" + Math.abs(Number(v)).toFixed(2) + "%)"
    : v + "%";
}

function daysTo(dateStr) {
  const today = new Date();
  const exp = new Date(dateStr);
  return Math.max(1, Math.round(
    (exp - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / 86400000
  ));
}

// ===== BUILD TABLE =====
function buildTable(expiryDate, xau, inr, mcxPer10g) {

  const expISO = toISO(expiryDate);
  const spotWith = xau * inr * conv / 1000 * duty;
  const mcxPerGram = mcxPer10g / 10;
  const premium = mcxPerGram - spotWith;
  const days = daysTo(expISO);
  const annualised = (premium / spotWith) / days * 365 * 100;
  const xauFwd = mcxPerGram / duty / inr / conv * 1000;

  return `
  <div class="card">
    <div class="card-title">${monthDay(expiryDate)} Contract (${formatExpiry(expiryDate)})</div>
    <table>
      <tr>
        <th>MCX<br>Expiry</th>
        <th>XAU/USD<br>Spot</th>
        <th>USD/INR<br>Spot</th>
        <th>Gold/INR<br>Spot<br>With Duty</th>
        <th>${monthDay(expiryDate)}<br>MCX Fwd<br>Rate</th>
        <th>Forward<br>Premium/<br>(Discount)</th>
        <th>Annualised<br>Fwd Premium/<br>(Discount) %</th>
        <th>XAU/USD<br>Forward<br>Rate</th>
      </tr>
      <tr>
        <td>${formatExpiry(expiryDate)}</td>
        <td>${d0(xau)}</td>
        <td>${d2(inr)}</td>
        <td>${d0(spotWith)}</td>
        <td>${d0(mcxPerGram)}</td>
        <td>${fmtPrem(premium)}</td>
        <td>${fmtPct(annualised)}</td>
        <td>${d0(xauFwd)}</td>
      </tr>
    </table>
  </div>
  `;
}

// ===== MAIN =====
async function load() {
  try {

    const res = await fetch(WORKER_URL, { cache: "no-store" });
    const data = await res.json();

    if (!data.ok) throw new Error("API returned not ok");

    const xau = Number(data.xau);
    const inr = Number(data.inr);
    const { near, next, far } = getExpiries();

    let html = "";

    // Near expiry (Jun)
    if (data.mcx_jun) {
      html += buildTable(near, xau, inr, data.mcx_jun);
    }

    // Next expiry (Aug)
    if (data.mcx_aug) {
      html += buildTable(next, xau, inr, data.mcx_aug);
    } else {
      html += `<div class="card">
        <div class="card-title">${monthDay(next)} Contract (${formatExpiry(next)})</div>
        <p style="color:#ccc; padding:6px; font-size:11px; text-align:center;">
          Next expiry data not available yet.
        </p>
      </div>`;
    }

    // Far expiry (Oct)
    if (data.mcx_oct) {
      html += buildTable(far, xau, inr, data.mcx_oct);
    } else {
      html += `<div class="card">
        <div class="card-title">${monthDay(far)} Contract (${formatExpiry(far)})</div>
        <p style="color:#ccc; padding:6px; font-size:11px; text-align:center;">
          Far expiry data not available yet.
        </p>
      </div>`;
    }

    document.getElementById("tables").innerHTML = html;
    lastFetchTime = Date.now();

    document.getElementById("updated").innerHTML =
      "Updated: " + new Date().toLocaleString();

    document.getElementById("footer").innerHTML =
      "Near: " + formatExpiry(near) +
      " &nbsp;|&nbsp; Next: " + formatExpiry(next) +
      " &nbsp;|&nbsp; Far: " + formatExpiry(far) +
      " &nbsp;|&nbsp; Auto-rolling";

  } catch (e) {
    console.error(e);
    document.getElementById("updated").innerHTML = "❌ Data error";
  }
}

// ===== AUTO REFRESH =====
setInterval(function() {
  if (!lastFetchTime || (Date.now() - lastFetchTime) > STALE_LIMIT) load();
}, 30000);

// ===== REFRESH ON APP OPEN =====
document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "visible") load();
});

window.addEventListener("focus", function() { load(); });

// ===== INITIAL LOAD =====
load();

</script>

</body>
</html>
